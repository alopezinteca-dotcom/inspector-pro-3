name: geomaster
description: GeoMaster mobile toolkit

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_map: ^6.2.1
  latlong2: ^0.9.0
  geolocator: ^10.1.1
  permission_handler: ^11.4.0
  flutter_launcher_icons: ^0.13.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
