plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.inspector.pro"
    compileSdkVersion 36

    defaultConfig {
        applicationId "com.inspector.pro"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    // ✅ JVM 17 (LO CORRECTO EN 2026)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "GeoMaster-${variant.name}.apk"
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // ❌ NO PONER kotlin-stdlib-jdk7
}
