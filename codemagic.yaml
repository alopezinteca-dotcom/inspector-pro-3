workflows:
  geomaster-release:
    name: GeoMaster Release Build
    max_build_duration: 90

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Clean and get packages
        script: |
          flutter clean
          flutter pub get

      - name: Build with Flutter (release)
        script: |
          flutter build appbundle --release || echo "Flutter wrapper failed"
          flutter build apk --release || echo "Flutter wrapper failed"

      - name: Fallback Gradle build (stable)
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew bundleRelease assembleRelease

      - name: Verify outputs
        script: |
          echo "===== Flutter outputs ====="
          ls -R build/app/outputs || true
          echo "===== Gradle outputs ====="
          ls -R android/app/build/outputs || true

    artifacts:
      - build/app/outputs/**/*.aab
      - build/app/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
